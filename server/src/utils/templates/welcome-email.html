<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Welcome!</title>
</head>
<body style="margin:0; padding:0; background:#f4f4f4; font-family: Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding: 40px 20px;">

        <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; padding:40px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
          <tr>
            <td align="center">

              <p style="font-size:2.5rem; margin:0 0 16px;">👋</p>
              <h2 style="margin:0 0 8px; color:#111; font-size:1.3rem;">Welcome, {{NAME}}!</h2>
              <p style="margin:0 0 28px; color:#666; font-size:0.9rem; line-height:1.6;">
                We're glad to have you on board.<br/>
                Your account has been created successfully.
              </p>

              <a href="{{APP_URL}}"
                 style="display:inline-block; background:#63dcf1; color:#fff; text-decoration:none;
                        padding:12px 32px; border-radius:6px; font-size:0.9rem; font-weight:500;">
                Get Started
              </a>

              <p style="margin:24px 0 0; color:#999; font-size:0.8rem;">
                If you didn't create an account, ignore this email.
              </p>

            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>

</body>
</html>
